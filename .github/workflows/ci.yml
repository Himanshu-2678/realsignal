name: RealSignal CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Set Up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Validate Imports
        run: |
          python -c "import fastapi"
          python -c "import sklearn"
          python -c "import pandas"
          python -c "import mlflow"


      - name: Validate Model Training Pipeline
        run: |
          python -m models.train_isolation_forest \
            --train_data dataset/processed/transactions_dataset.csv \
            --eval_data dataset/processed/transactions_dataset.csv


      - name: Build Docker Image
        run: |
          docker build -t realsignal .
